name: Auto Translate

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/myengie/translations/en.json'
      - 'custom_components/myengie/translations/en.context.json'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install deep-translator

      - name: Translate missing strings
        id: translate
        run: |
          python .github/scripts/translate_strings.py
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ $EXIT -eq 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            exit $EXIT
          fi

      - name: Bump patch version
        if: steps.translate.outputs.changed == 'true'
        run: |
          python - <<'EOF'
          import json
          with open('custom_components/myengie/manifest.json') as f:
              m = json.load(f)
          major, minor, patch = m['version'].split('.')
          m['version'] = f'{major}.{minor}.{int(patch)+1}'
          with open('custom_components/myengie/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          print(f"Bumped to {m['version']}")
          EOF

      - name: Commit and push to main
        if: steps.translate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/myengie/translations/ custom_components/myengie/manifest.json
          git commit -m "chore: auto-translate new strings and bump version [skip ci]"
          git push origin main
